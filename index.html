<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>급여 정리 파일 생성기</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 20px;
    color: #202124;
    background: #fafafa;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #5f6368; font-size: 14px; margin-bottom: 24px; }
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
  .upload label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
  .upload input[type=file] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; }
  .options { display: flex; gap: 12px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .options input[type=text] { flex: 1; min-width: 200px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; }
  button {
    padding: 12px 24px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #1557b0; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .log {
    margin-top: 16px;
    padding: 12px 14px;
    background: #1e1e1e;
    color: #d4d4d4;
    border-radius: 8px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 320px;
    overflow-y: auto;
    min-height: 60px;
  }
  .log:empty::before { content: '로그가 여기에 표시됩니다.'; color: #888; }
  .hint { color: #5f6368; font-size: 12px; margin-top: 6px; }
  .build-stamp {
    position: fixed;
    top: 12px;
    right: 14px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: #80868b;
    background: rgba(255,255,255,0.85);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #e0e0e0;
  }
</style>
</head>
<body>
  <div class="build-stamp">build: 2026-05-19 01:27 KST</div>
  <h1>급여 정리 파일 생성기</h1>
  <p class="sub">Shifts Details 파일을 업로드하면 직원별 시트로 정리된 엑셀 파일을 생성합니다.</p>

  <div class="card upload">
    <label>Details 파일</label>
    <input type="file" id="detailsFile" accept=".csv,.xls,.xlsx">
    <div class="hint">예: Shifts_05-01-2026_05-15-2026.xls - Details.csv</div>
  </div>

  <div class="card">
    <label style="display:block;font-weight:600;margin-bottom:8px;font-size:14px;">출력 파일명</label>
    <input type="text" id="filename" value="급여정리_05-01-05-15.xlsx" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;">
  </div>

  <button id="generate">급여 파일 생성</button>
  <div class="log" id="log"></div>

<script>
const HEADERS = [
  'Employee name', 'Account', 'Date',
  'Clocked In', 'Clocked Out', 'Duration',
  'Unpaid Break Time', 'Paid Break Time',
  'Payable Hours', 'Regular Hours', 'Overtime Hours'
];

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function to24Hour(timeStr) {
  if (timeStr === null || timeStr === undefined) return '';
  const s = String(timeStr).trim();
  if (!s) return '';
  if (/\(\+1\s*day\)/i.test(s)) return s;
  const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?$/i);
  if (!m) return s;
  let h = parseInt(m[1], 10);
  const min = m[2];
  const sec = m[3] || '00';
  const ampm = m[4] ? m[4].toUpperCase() : null;
  if (ampm === 'PM' && h < 12) h += 12;
  else if (ampm === 'AM' && h === 12) h = 0;
  return String(h).padStart(2, '0') + ':' + min + ':' + sec;
}

function extractDetailsFromSheet(ws) {
  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false, blankrows: false });
  if (aoa.length === 0) return null;

  const norm = s => String(s || '').toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
  let headerIdx = -1;
  for (let i = 0; i < Math.min(aoa.length, 30); i++) {
    const cells = aoa[i].map(norm);
    const hasName = cells.includes('employeename');
    const hasClockedIn = cells.includes('clockedin');
    const hasDate = cells.includes('date');
    if (hasName && hasClockedIn && hasDate) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx === -1) return null;

  const headers = aoa[headerIdx].map(h => String(h || '').trim());
  const rows = [];
  for (let i = headerIdx + 1; i < aoa.length; i++) {
    const row = aoa[i];
    if (!row || row.every(c => c === '' || c === null || c === undefined)) continue;
    const obj = {};
    for (let j = 0; j < headers.length; j++) {
      if (headers[j]) obj[headers[j]] = row[j] !== undefined ? row[j] : '';
    }
    if (!obj['Employee Name'] || String(obj['Employee Name']).trim() === '') continue;
    rows.push(obj);
  }
  return rows.length > 0 ? rows : null;
}

async function readFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', cellDates: false, raw: false });

  for (const sheetName of wb.SheetNames) {
    const result = extractDetailsFromSheet(wb.Sheets[sheetName]);
    if (result) {
      log(`시트 "${sheetName}"에서 Details 헤더 발견`);
      return result;
    }
  }
  return [];
}

function findKey(row, candidates) {
  const keys = Object.keys(row);
  const norm = s => s.toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
  for (const c of candidates) {
    const target = norm(c);
    const found = keys.find(k => norm(k) === target);
    if (found) return found;
  }
  for (const c of candidates) {
    const target = norm(c);
    const found = keys.find(k => norm(k).includes(target));
    if (found) return found;
  }
  return null;
}

function sanitizeSheetName(name) {
  return name.replace(/[\\\/\?\*\[\]:]/g, '_').slice(0, 31);
}

async function generate() {
  const btn = document.getElementById('generate');
  btn.disabled = true;
  document.getElementById('log').textContent = '';

  try {
    const detailsFile = document.getElementById('detailsFile').files[0];
    if (!detailsFile) {
      alert('Details 파일을 업로드해주세요');
      return;
    }
    const filename = document.getElementById('filename').value.trim() || '급여정리.xlsx';

    log('Details 파일 읽는 중...');
    const rows = await readFile(detailsFile);

    if (rows.length === 0) {
      throw new Error('Details 헤더(Employee Name + Date + Clocked In)를 찾지 못했습니다. Summary 파일을 잘못 업로드했거나, 파일 구조가 다른 것 같습니다. 파일에 Date와 Clocked In 컬럼이 있는지 확인해주세요.');
    }
    log(`${rows.length}개 행 로드됨`);

    const sample = rows[0];
    const k = {
      name: findKey(sample, ['Employee Name', 'Employee']),
      account: findKey(sample, ['Account']),
      date: findKey(sample, ['Date']),
      in: findKey(sample, ['Clocked In']),
      out: findKey(sample, ['Clocked Out']),
      duration: findKey(sample, ['Duration']),
      unpaid: findKey(sample, ['Unpaid Break Time', 'Unpaid Break']),
      paid: findKey(sample, ['Paid Break Time', 'Paid Break']),
      payable: findKey(sample, ['Payable Hours', 'payable Hours']),
      regular: findKey(sample, ['Regular Hours']),
      overtime: findKey(sample, ['Overtime Hours']),
    };
    log('컬럼 매핑 완료');

    const byEmployee = {};
    for (const r of rows) {
      const name = (r[k.name] || '').toString().trim();
      if (!name) continue;
      if (!byEmployee[name]) byEmployee[name] = [];
      byEmployee[name].push(r);
    }

    const names = Object.keys(byEmployee).sort();
    log(`직원 수: ${names.length}`);

    const wb = XLSX.utils.book_new();
    const usedSheetNames = new Set();

    for (const name of names) {
      const sheetRows = [HEADERS];
      for (const r of byEmployee[name]) {
        sheetRows.push([
          r[k.name] || '',
          k.account ? (r[k.account] || '') : '',
          k.date ? (r[k.date] || '') : '',
          k.in ? to24Hour(r[k.in]) : '',
          k.out ? to24Hour(r[k.out]) : '',
          k.duration ? (r[k.duration] || '') : '',
          k.unpaid ? (r[k.unpaid] || '') : '',
          k.paid ? (r[k.paid] || '') : '',
          k.payable ? (r[k.payable] || '') : '',
          k.regular ? (r[k.regular] || '') : '',
          k.overtime ? (r[k.overtime] || '') : '',
        ]);
      }
      const ws = XLSX.utils.aoa_to_sheet(sheetRows);
      ws['!cols'] = [
        { wch: 18 }, { wch: 12 }, { wch: 12 },
        { wch: 14 }, { wch: 18 }, { wch: 10 },
        { wch: 16 }, { wch: 14 }, { wch: 13 }, { wch: 13 }, { wch: 14 }
      ];
      let safeName = sanitizeSheetName(name);
      let dedupe = 2;
      while (usedSheetNames.has(safeName)) {
        const suffix = `_${dedupe++}`;
        safeName = sanitizeSheetName(name).slice(0, 31 - suffix.length) + suffix;
      }
      usedSheetNames.add(safeName);
      XLSX.utils.book_append_sheet(wb, ws, safeName);
      log(`시트 생성: ${safeName} (${byEmployee[name].length}행)`);
    }

    XLSX.writeFile(wb, filename);
    log('');
    log('완료! 파일이 다운로드되었습니다: ' + filename);
    log('Google Sheets로 열기: drive.google.com에 파일을 드래그하면 자동 변환됩니다.');
  } catch (e) {
    log('오류: ' + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('generate').addEventListener('click', generate);
</script>
</body>
</html>
